<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>CI Loading 訊息產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  /* Light blue palette */
  --bg:          #eef4fb;
  --bg2:         #ddeaf8;
  --card:        #ffffff;
  --card2:       #f4f8fd;
  --border:      #c8ddf2;
  --border-mid:  #a8c8e8;
  --text:        #1a2a3a;
  --text-mid:    #3a5268;
  --muted:       #7a9ab8;

/* Blue accent */
–blue:        #2e82d4;
–blue-light:  #eaf3fc;
–blue-glow:   rgba(46,130,212,.15);

/* Pink/coral highlight */
–pink:        #e8426e;
–pink-light:  #fde8ef;
–pink-glow:   rgba(232,66,110,.12);

/* Status */
–green:       #1daa6f;
–green-bg:    #e8f8f2;
–green-bdr:   #a3dfc5;
–amber:       #c87c00;
–amber-bg:    #fdf4e3;
–amber-bdr:   #f0ce80;
–red:         #c0293a;
–red-bg:      #fdeaec;
–red-bdr:     #f0a8b0;

–radius:      16px;
–radius-sm:   10px;
–mono:        ‘IBM Plex Mono’, monospace;
–sans:        ‘Noto Sans TC’, system-ui, sans-serif;
–shadow:      0 2px 12px rgba(30,80,140,.08);
–shadow-md:   0 4px 24px rgba(30,80,140,.12);
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: var(–sans);
background: var(–bg);
color: var(–text);
min-height: 100vh;
min-height: 100dvh;
-webkit-text-size-adjust: 100%;
}

/* ── Top bar ── */
.topbar {
display: flex;
align-items: center;
padding: 0 16px;
height: 52px;
background: var(–card);
border-bottom: 1.5px solid var(–border);
box-shadow: var(–shadow);
position: sticky;
top: 0;
z-index: 100;
}
.topbar-logo {
font-family: var(–mono);
font-weight: 600;
font-size: 15px;
letter-spacing: .04em;
color: var(–blue);
display: flex;
align-items: center;
gap: 8px;
}
.topbar-badge {
background: var(–pink);
color: white;
font-size: 9px;
font-weight: 700;
padding: 2px 6px;
border-radius: 4px;
letter-spacing: .08em;
}

/* ── Page layout ── */
.page {
max-width: 600px;
margin: 0 auto;
padding: 16px 14px 100px;
display: flex;
flex-direction: column;
gap: 14px;
}

/* ── Cards ── */
.card {
background: var(–card);
border: 1.5px solid var(–border);
border-radius: var(–radius);
box-shadow: var(–shadow);
overflow: hidden;
}
.card-header {
padding: 13px 16px 11px;
border-bottom: 1.5px solid var(–border);
display: flex;
align-items: center;
justify-content: space-between;
background: var(–card2);
}
.card-title {
font-size: 11px;
font-family: var(–mono);
font-weight: 600;
letter-spacing: .1em;
text-transform: uppercase;
color: var(–blue);
}
.card-body {
padding: 16px;
display: flex;
flex-direction: column;
gap: 14px;
}

/* ── Form rows ── */
.row-2 {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
}
.field { display: flex; flex-direction: column; gap: 5px; }

label {
font-size: 11px;
font-family: var(–mono);
font-weight: 600;
letter-spacing: .07em;
text-transform: uppercase;
color: var(–muted);
}

/* ── Inputs ── */
input[type=“text”],
input[type=“date”] {
width: 100%;
background: var(–card2);
border: 1.5px solid var(–border);
border-radius: var(–radius-sm);
padding: 12px 14px;
font-size: 16px;
font-family: var(–mono);
color: var(–text);
outline: none;
transition: border-color .15s, box-shadow .15s, background .15s;
min-height: 50px;
-webkit-appearance: none;
appearance: none;
}
input:focus {
border-color: var(–blue);
background: white;
box-shadow: 0 0 0 3px var(–blue-glow);
}
input::placeholder {
color: var(–muted);
opacity: .55;
font-size: 14px;
}
/* Date input: make chevron blue */
input[type=“date”]::-webkit-calendar-picker-indicator {
opacity: .5;
cursor: pointer;
}

/* ── Cabin grid ── */
.cabin-row {
display: grid;
grid-template-columns: repeat(3, 1fr);
gap: 8px;
}
.cabin-cell { position: relative; }
.cabin-tag {
position: absolute;
top: 50%; right: 12px;
transform: translateY(-50%);
font-size: 11px;
font-family: var(–mono);
font-weight: 700;
color: var(–blue);
pointer-events: none;
letter-spacing: .05em;
}
.cabin-cell input { padding-right: 30px; }
.cabin-cell.hidden { display: none; }

/* ── Toggle (W cabin) ── */
.toggle-row {
display: flex;
align-items: center;
gap: 10px;
padding: 4px 0;
}
.toggle-switch {
position: relative;
width: 44px;
height: 26px;
flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }
.toggle-slider {
position: absolute;
inset: 0;
background: var(–border-mid);
border-radius: 13px;
transition: background .2s;
cursor: pointer;
}
.toggle-slider:before {
content: ‘’;
position: absolute;
width: 20px;
height: 20px;
left: 3px;
top: 3px;
background: white;
border-radius: 50%;
transition: transform .2s;
box-shadow: 0 1px 4px rgba(0,0,0,.15);
}
.toggle-switch input:checked + .toggle-slider { background: var(–blue); }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(18px); }
.toggle-label { font-size: 14px; color: var(–text-mid); font-weight: 500; }

/* ── Route status ── */
.route-status {
padding: 12px 14px;
border-radius: var(–radius-sm);
border: 1.5px solid var(–border);
background: var(–card2);
font-size: 13px;
line-height: 1.5;
color: var(–text-mid);
}
.route-status.ok  { border-color: var(–green-bdr);  background: var(–green-bg);  color: var(–green); }
.route-status.warn{ border-color: var(–amber-bdr);  background: var(–amber-bg);  color: var(–amber); }
.route-status.err { border-color: var(–red-bdr);    background: var(–red-bg);    color: var(–red); }
.route-status .rs-label {
font-family: var(–mono);
font-size: 10px;
font-weight: 600;
letter-spacing: .08em;
text-transform: uppercase;
opacity: .65;
margin-bottom: 3px;
}
.route-options { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
.route-option {
display: flex;
align-items: center;
gap: 10px;
padding: 10px 12px;
background: white;
border: 1.5px solid var(–border);
border-radius: 8px;
cursor: pointer;
transition: border-color .15s, background .15s;
}
.route-option:hover { border-color: var(–blue); background: var(–blue-light); }
.route-option input[type=radio] { accent-color: var(–blue); width: 16px; height: 16px; flex-shrink: 0; }
.route-option .rcode { font-family: var(–mono); font-weight: 600; font-size: 14px; color: var(–text); }
.route-option .robs { font-size: 11px; color: var(–muted); margin-top: 1px; font-family: var(–mono); }

/* ── Output area ── */
.format-tabs { display: flex; gap: 4px; }
.fmt-btn {
font-size: 11px;
font-family: var(–mono);
font-weight: 700;
padding: 5px 14px;
border-radius: 6px;
min-height: auto;
letter-spacing: .05em;
background: transparent;
border: 1.5px solid var(–border);
color: var(–muted);
text-transform: uppercase;
cursor: pointer;
transition: all .15s;
}
.fmt-btn.active {
background: var(–blue);
color: white;
border-color: var(–blue);
}

textarea {
width: 100%;
min-height: 160px;
background: var(–card2);
border: 1.5px solid var(–border);
border-radius: var(–radius-sm);
padding: 14px;
font-size: 14px;
font-family: var(–mono);
line-height: 1.7;
color: var(–text);
outline: none;
resize: vertical;
transition: border-color .15s, box-shadow .15s;
-webkit-appearance: none;
}
textarea:focus {
border-color: var(–blue);
box-shadow: 0 0 0 3px var(–blue-glow);
background: white;
}

/* Example box */
.example-box {
padding: 12px 14px;
background: var(–blue-light);
border: 1.5px solid #c0d8f0;
border-radius: var(–radius-sm);
}
.example-title {
font-size: 10px;
font-family: var(–mono);
font-weight: 700;
letter-spacing: .09em;
text-transform: uppercase;
color: var(–blue);
margin-bottom: 7px;
opacity: .8;
}
.example-text {
font-family: var(–mono);
font-size: 12px;
color: var(–text-mid);
line-height: 1.75;
white-space: pre;
}

/* ── Sticky bottom actions ── */
.sticky-actions {
position: fixed;
bottom: 0;
left: 0; right: 0;
padding: 12px 14px;
padding-bottom: calc(12px + env(safe-area-inset-bottom));
background: rgba(238,244,251,.92);
backdrop-filter: blur(16px);
-webkit-backdrop-filter: blur(16px);
border-top: 1.5px solid var(–border);
display: flex;
gap: 10px;
z-index: 50;
}
.btn-generate {
flex: 1;
appearance: none;
border: 0;
cursor: pointer;
border-radius: 12px;
padding: 0 20px;
height: 52px;
font-size: 16px;
font-family: var(–sans);
font-weight: 900;
letter-spacing: .02em;
background: var(–pink);
color: white;
box-shadow: 0 4px 16px var(–pink-glow);
transition: transform .08s, opacity .15s;
touch-action: manipulation;
}
.btn-generate:active { transform: scale(.97); }

.btn-copy {
appearance: none;
border: 2px solid var(–blue);
cursor: pointer;
border-radius: 12px;
padding: 0 20px;
height: 52px;
font-size: 15px;
font-family: var(–sans);
font-weight: 700;
background: white;
color: var(–blue);
transition: transform .08s, background .15s;
touch-action: manipulation;
white-space: nowrap;
}
.btn-copy:active { transform: scale(.97); background: var(–blue-light); }

.btn-clear {
appearance: none;
border: 2px solid var(–border-mid);
cursor: pointer;
border-radius: 12px;
padding: 0 16px;
height: 52px;
font-size: 14px;
font-family: var(–sans);
font-weight: 600;
background: white;
color: var(–muted);
transition: transform .08s;
touch-action: manipulation;
}
.btn-clear:active { transform: scale(.97); }
.btn-share {
appearance: none;
border: 2px solid var(–pink);
cursor: pointer;
border-radius: 12px;
padding: 0 16px;
height: 52px;
font-size: 22px;
background: white;
color: var(–pink);
transition: transform .08s, background .15s;
touch-action: manipulation;
line-height: 1;
}
.btn-share:active { transform: scale(.97); background: var(–pink-light); }

/* ── Desktop adjustments ── */
@media (min-width: 640px) {
.page { padding: 24px 20px 120px; }
.sticky-actions { max-width: 600px; left: 50%; transform: translateX(-50%); border-radius: 16px 16px 0 0; }
}
</style>

</head>

  return zh ? iata + zh : iata;

// ── DOM ──
const el = {
  date: document.getElementById('flightDate'),
  no: document.getElementById('flightNo'),
  dep: document.getElementById('dep'),
  arr: document.getElementById('arr'),
  premium: document.getElementById('hasPremium'),
  availC: document.getElementById('availC'),
  availW: document.getElementById('availW'),
  availY: document.getElementById('availY'),
  waitC: document.getElementById('waitC'),
  waitW: document.getElementById('waitW'),
  waitY: document.getElementById('waitY'),
  output: document.getElementById('output'),
  routeStatus: document.getElementById('routeStatus'),
  routeText: document.getElementById('routeText'),
  routeOptions: document.getElementById('routeOptions'),
  availWCell: document.getElementById('availWCell'),
  waitWCell: document.getElementById('waitWCell'),
  dbStat: document.getElementById('dbStat'),
  exampleText: document.getElementById('exampleText'),
  fmtStd: document.getElementById('fmtStd'),
  fmtCpt: document.getElementById('fmtCpt'),
};

let currentFormat = 'standard';

// ── Init ──
function setToday() {
  const d = new Date();
  el.date.value = [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
}
setToday();
renderPremium();
updateRoute();
renderExample();

const total = Object.keys(CI_FLIGHT_MASTER).length;


// ── Utilities ──
function normFlight(v) {
  const raw = String(v||'').toUpperCase().replace(/\s+/g,'');
  if (!raw) return '';
  const digits = raw.replace(/^CI/,'').replace(/\D/g,'');
  if (!digits) return raw;
  return 'CI' + String(parseInt(digits, 10));
}
function normFlightKey(v) {
  // Returns 4-digit padded key for DB lookup e.g. CI0503
  const raw = String(v||'').toUpperCase().replace(/\s+/g,'');
  if (!raw) return '';
  const digits = raw.replace(/^CI/,'').replace(/\D/g,'');
  if (!digits) return raw;
  const padded = digits.length <= 4 ? digits.padStart(4,'0') : digits;
  return 'CI' + padded;
}
function uppercaseIata(inp) {
  inp.value = String(inp.value||'').toUpperCase().replace(/[^A-Z]/g,'').slice(0,3);
}
function cleanNum(v) {
  const n = Number(v);
  return (Number.isFinite(n) && n >= 0) ? String(Math.trunc(n)) : '0';
}
function fmtDate(v, compact) {
  if (!v) return compact ? 'MM/DD' : 'YYYY/MM/DD';
  const [y,m,d] = v.split('-');
  return compact ? `${m}/${d}` : `${y}/${m}/${d}`;
}

// ── Premium toggle ──
function renderPremium() {
  const show = el.premium.checked;
  el.availWCell.classList.toggle('hidden', !show);
  el.waitWCell.classList.toggle('hidden', !show);
}
el.premium.addEventListener('change', () => { renderPremium(); autoGenerate(); });

// ── Route logic ──
function updateRoute(normalizeField) {
  const norm = normFlight(el.no.value);
  // Only rewrite field on blur, not during typing
  if (normalizeField && norm && norm !== el.no.value.toUpperCase().replace(/\s+/g,'')) {
    el.no.value = norm;
  }
  el.routeOptions.innerHTML = '';

  const box = el.routeStatus;
  box.className = 'route-status';

  if (!norm) {
    el.routeText.textContent = '尚未輸入航班號。';
    return;
  }

  const info = CI_FLIGHT_MASTER[normFlightKey(el.no.value)];
  if (!info) {
    box.classList.add('err');
    el.routeText.textContent = `${norm} 不在資料庫内，請手動輸入航段。`;
    return;
  }

  if (info.auto_fill_safe && info.routes.length === 1) {
    const r = info.routes[0];
    el.dep.value = r.dep;
    el.arr.value = r.arr;
    box.classList.add('ok');
    el.routeText.textContent = `${norm}  ·  已自動帶入 ${r.route}`;
    return;
  }

  box.classList.add('warn');
  el.routeText.textContent = `${norm} 對應多個航段，請選擇：`;
  info.routes.forEach((r, i) => {
    const lbl = document.createElement('label');
    lbl.className = 'route-option';
    lbl.innerHTML = `
      <input type="radio" name="rc" value="${i}" />
      <div>
        <div class="rcode">${r.route}</div>
        <div class="robs">OBS ${r.observations ?? '-'} · ${r.dep} → ${r.arr}</div>
      </div>`;
    lbl.querySelector('input').addEventListener('change', () => {
      el.dep.value = r.dep;
      el.arr.value = r.arr;
      box.className = 'route-status ok';
      el.routeText.textContent = `${norm}  ·  已選擇 ${r.route}`;
      el.routeOptions.innerHTML = '';
      autoGenerate();
    });
    el.routeOptions.appendChild(lbl);
  });
}

// ── Build cabin string ──
function cabinLine(type) {
  // Standard: 商務6/豪經3/經濟10
  const hasW = el.premium.checked;
  const vals = type === 'avail'
    ? { C: cleanNum(el.availC.value), W: cleanNum(el.availW.value), Y: cleanNum(el.availY.value) }
    : { C: cleanNum(el.waitC.value), W: cleanNum(el.waitW.value), Y: cleanNum(el.waitY.value) };
  const parts = [`商務${vals.C}`];
  if (hasW) parts.push(`豪經${vals.W}`);
  parts.push(`經濟${vals.Y}`);
  return parts.join('/');
}
function cabinCompact(type) {
  // Compact: C6/W3/Y10
  const hasW = el.premium.checked;
  const vals = type === 'avail'
    ? { C: cleanNum(el.availC.value), W: cleanNum(el.availW.value), Y: cleanNum(el.availY.value) }
    : { C: cleanNum(el.waitC.value), W: cleanNum(el.waitW.value), Y: cleanNum(el.waitY.value) };
  const parts = [`C${vals.C}`];
  if (hasW) parts.push(`W${vals.W}`);
  parts.push(`Y${vals.Y}`);
  return parts.join('/');
}

// ── Traffic light ──
function trafficLight() {
  const avail = Number(cleanNum(el.availC.value)) + Number(cleanNum(el.availW.value)) + Number(cleanNum(el.availY.value));
  const wait  = Number(cleanNum(el.waitC.value))  + Number(cleanNum(el.waitW.value))  + Number(cleanNum(el.waitY.value));
  const diff = avail - wait;
  if (diff >= 15) return '🟢';
  if (diff >= 8)  return '🟡';
  if (diff > 0)   return '🟠';
  return '🔴';
}

// ── Generate message ──
function generateMessage(fmt) {
  fmt = fmt || currentFormat;
  const no = normFlight(el.no.value) || 'CI0000';
  const dep = (el.dep.value||'').toUpperCase();
  const arr = (el.arr.value||'').toUpperCase();
  const light = trafficLight();
  let txt = '';
  if (fmt === 'compact') {
    const route = (dep && arr) ? `${dep}-${arr}` : 'XXX-XXX';
    txt = `${light}${fmtDate(el.date.value,true)} ${no} ${route}\n`;
    txt += `空位 ${cabinCompact('avail')}\n`;
    txt += `候補 ${cabinCompact('wait')}`;
  } else {
    const depLabel = cityLabel(dep);
    const arrLabel = cityLabel(arr);
    const routeLabel = (dep && arr) ? `${depLabel}-${arrLabel}` : 'XXX-XXX';
    txt = `${light}${fmtDate(el.date.value,false)} ${no}\n${routeLabel}\n`;
    txt += `空位：${cabinLine('avail')}\n`;
    txt += `候補：${cabinLine('wait')}`;
  }
  el.output.value = txt;
  currentFormat = fmt;
}

function autoGenerate() {
  if (el.output.value.trim()) generateMessage();
}

// ── Render example ──
function renderExample() {
  const now = new Date();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  const y = now.getFullYear();
  if (currentFormat === 'compact') {
    el.exampleText.textContent =
      `${m}/${d} CI0503 TPE-PVG\nAVL C2/W1/Y15\nWL  C0/W2/Y8`;
  } else {
    el.exampleText.textContent =
      `${y}/${m}/${d} CI0503 TPE-PVG\n空位：C 2 / W 1 / Y 15\n候補：C 0 / W 2 / Y 8`;
  }
}

// ── Copy ──
function copyOutput() {
  const txt = el.output.value.trim();
  if (!txt) { alert('請先產生訊息。'); return; }
  navigator.clipboard.writeText(txt).then(() => {
    const btn = document.getElementById('copyBtn');
    const old = btn.textContent;
    btn.textContent = '✓ 已複製';
    setTimeout(() => btn.textContent = old, 1400);
  }).catch(() => {
    el.output.select();
    document.execCommand('copy');
  });
}

// ── Clear ──
function clearAll() {
  el.no.value = '';
  el.dep.value = '';
  el.arr.value = '';
  el.premium.checked = false;
  ['availC','availW','availY','waitC','waitW','waitY'].forEach(k => el[k].value = '');
  el.output.value = '';
  setToday();
  renderPremium();
  updateRoute(false);
}

// ── Format tabs ──
function setFormat(fmt) {
  currentFormat = fmt;
  el.fmtStd.classList.toggle('active', fmt === 'standard');
  el.fmtCpt.classList.toggle('active', fmt === 'compact');
  renderExample();
  if (el.output.value.trim()) generateMessage(fmt);
}

// ── Events ──
document.getElementById('generateBtn').addEventListener('click', () => generateMessage());
document.getElementById('copyBtn').addEventListener('click', copyOutput);
document.getElementById('clearBtn').addEventListener('click', clearAll);
document.getElementById('shareBtn').addEventListener('click', () => {
  const txt = el.output.value.trim();
  if (!txt) { alert('請先產生訊息。'); return; }
  if (navigator.share) {
    navigator.share({ text: txt }).catch(() => {});
  } else {
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.getElementById('shareBtn');
      const old = btn.innerHTML;
      btn.innerHTML = '✓';
      setTimeout(() => btn.innerHTML = old, 1200);
    });
  }
});
el.fmtStd.addEventListener('click', () => setFormat('standard'));
el.fmtCpt.addEventListener('click', () => setFormat('compact'));
el.no.addEventListener('input', () => updateRoute(false));
el.no.addEventListener('blur', () => { updateRoute(true); autoGenerate(); });
el.dep.addEventListener('input', () => uppercaseIata(el.dep));
el.arr.addEventListener('input', () => uppercaseIata(el.arr));
['dep','arr','availC','availW','availY','waitC','waitW','waitY','date'].forEach(k => {
  el[k].addEventListener('change', autoGenerate);
  el[k].addEventListener('input', () => { if (el.output.value.trim()) autoGenerate(); });
});
